# sops + age encryption rules.
# Keyless: the private key lives only in 1Password (op://Private/sops/SOPS_PRIVATE_KEY).
# sops (>=3.10) fetches it on demand via SOPS_AGE_KEY_CMD="op read ..." (exported in
# .zprofile), so it never touches disk. Only the public recipient below is committed.
# Encrypt a file with:  sops -e -i secrets/<name>.sops.yaml
# Edit in place with:   sops secrets/<name>.sops.yaml
creation_rules:
  - path_regex: secrets/.*\.sops\.ya?ml$
    age: age1mdmj4hl2e2m5rrvglf2rccy7m8875ff6sdkuh38g25g4gtz0md0sxx7u80
