<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}} — Executive Brief</title>
<style>
  :root {
    --ink: #1a1d21;
    --muted: #5c636b;
    --line: #e3e6ea;
    --accent: #2f5bd0;
    --accent-soft: #eef2fc;
    --warn: #b4690e;
    --card: #ffffff;
    --bg: #f6f7f9;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 48px 24px 96px; }
  header.doc { margin-bottom: 32px; }
  header.doc .eyebrow {
    text-transform: uppercase; letter-spacing: .08em; font-size: 12px;
    font-weight: 700; color: var(--accent);
  }
  header.doc h1 { font-size: 30px; line-height: 1.25; margin: 6px 0 8px; }
  header.doc .meta { color: var(--muted); font-size: 13px; }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 28px 30px; box-shadow: 0 1px 2px rgba(16,24,40,.04);
  }
  .brief-grid { display: grid; gap: 22px; }
  .field .label {
    text-transform: uppercase; letter-spacing: .06em; font-size: 11.5px;
    font-weight: 700; color: var(--muted); margin-bottom: 6px;
  }
  .field .objective { font-size: 19px; font-weight: 600; line-height: 1.4; }
  .field p { margin: 0; }
  .field ul { margin: 0; padding-left: 20px; }
  .field li { margin: 4px 0; }
  .field li.risk { margin: 10px 0; }
  .field li.risk .mit { color: var(--muted); display: block; font-size: 14px; }
  .field li.risk .mit::before { content: "↳ "; }

  .pill-decisions li {
    list-style: none; padding: 8px 12px; margin: 8px 0;
    background: #fff8ec; border: 1px solid #f0dcb4; border-radius: 8px;
  }
  .pill-decisions { padding-left: 0; }

  .divider { height: 1px; background: var(--line); margin: 36px 0; border: 0; }

  details.full {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 4px 24px;
  }
  details.full > summary {
    cursor: pointer; padding: 18px 0; font-weight: 600; font-size: 15px;
    list-style: none; display: flex; align-items: center; gap: 8px;
  }
  details.full > summary::-webkit-details-marker { display: none; }
  details.full > summary::before {
    content: "▸"; color: var(--accent); transition: transform .15s ease;
  }
  details.full[open] > summary::before { transform: rotate(90deg); }
  .plan-body { padding: 0 0 24px; border-top: 1px solid var(--line); margin-top: 4px; }
  .plan-body h1 { font-size: 22px; margin: 24px 0 8px; }
  .plan-body h2 { font-size: 18px; margin: 22px 0 6px; padding-top: 16px; border-top: 1px solid var(--line); }
  .plan-body h3 { font-size: 15.5px; margin: 16px 0 4px; }
  .plan-body h4 { font-size: 14px; margin: 12px 0 4px; color: var(--muted); }
  .plan-body code {
    background: var(--accent-soft); padding: 1px 5px; border-radius: 4px;
    font-size: 13.5px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  .plan-body pre {
    background: #0f1320; color: #e7eaf0; padding: 14px 16px; border-radius: 8px;
    overflow-x: auto; font-size: 13px; line-height: 1.5;
  }
  .plan-body pre code { background: none; padding: 0; color: inherit; }
  .plan-body a { color: var(--accent); }
  .plan-body table {
    border-collapse: collapse; width: 100%; margin: 14px 0; font-size: 14px;
  }
  .plan-body th, .plan-body td {
    border: 1px solid var(--line); padding: 7px 10px; text-align: left; vertical-align: top;
  }
  .plan-body th { background: var(--accent-soft); font-weight: 600; }
  .plan-body tbody tr:nth-child(even) { background: #fafbfc; }

  footer.doc { color: var(--muted); font-size: 12px; text-align: center; margin-top: 40px; }

  @media print {
    body { background: #fff; }
    .wrap { padding: 0; max-width: none; }
    .card, details.full { border: none; box-shadow: none; padding: 0; }
    details.full { margin-top: 24px; }
    details.full[open] > summary { display: none; }
    .plan-body { border-top: none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="doc">
      <div class="eyebrow">Executive Brief</div>
      <h1>{{TITLE}}</h1>
      <div class="meta">Generated {{GENERATED_AT}}</div>
    </header>

    <section class="card brief-grid">
      {{EXEC_BRIEF}}
    </section>

    <hr class="divider">

    <details class="full">
      <summary>Full plan detail</summary>
      <div class="plan-body">
        {{FULL_PLAN}}
      </div>
    </details>

    <footer class="doc">Distilled from the source plan — open the section above for complete detail.</footer>
  </div>
</body>
</html>
